name: Bluesky Engagement

on:
  # Run 4 times a day to catch mentions (all within 7am–11pm CDT)
  schedule:
    - cron: '30 13 * * *'  # 1:30 PM UTC = 8:30 AM CDT
    - cron: '30 16 * * *'  # 4:30 PM UTC = 11:30 AM CDT
    - cron: '30 19 * * *'  # 7:30 PM UTC = 2:30 PM CDT
    - cron: '30 0 * * *'   # 12:30 AM UTC = 7:30 PM CDT (prev day)

  # Allow manual triggering
  workflow_dispatch:

permissions:
  contents: write

jobs:
  engage:
    runs-on: ubuntu-latest

    steps:
      - name: Random delay
        run: |
          # Random delay 1-5 minutes
          DELAY=$((RANDOM % 300 + 60))
          echo "Waiting ${DELAY} seconds..."
          sleep $DELAY

      - uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/setup-python-env

      - name: Like mentions on Bluesky
        env:
          BLUESKY_USERNAME: ${{ secrets.BLUESKY_USERNAME }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: |
          python scripts/bluesky_engage.py

      - name: Commit engagement history
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add bluesky_engagement_history.json

          if ! git diff --staged --quiet; then
            git commit -m "Update Bluesky engagement history [skip ci]"

            for i in {1..3}; do
              git pull --rebase origin main && git push && break || {
                echo "Push failed (attempt $i/3), retrying..."
                sleep $((i * 2))
              }
            done
          fi
