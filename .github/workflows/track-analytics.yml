name: Track Analytics

on:
  # Run once daily at 11 PM UTC (after most daily posts)
  schedule:
    - cron: '0 23 * * *'

  # Allow manual triggering
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track-analytics:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/setup-python-env

      - name: Track analytics
        env:
          # X creds intentionally NOT passed — analytics pulled X follower
          # counts and per-tweet metrics via get_me() / get_tweets(), both
          # billable READS that contribute to the enrolled-account spend
          # cap. Disabled 2026-05-02. With no env vars present, TwitterBot()
          # init raises ValueError and the X analytics functions catch it
          # and return None, leaving Bluesky analytics intact. To re-enable,
          # restore the X_* env vars below.

          # Bluesky credentials
          BLUESKY_USERNAME: ${{ secrets.BLUESKY_USERNAME }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: |
          python scripts/track_analytics.py

      - name: Generate nightly report
        if: always()
        run: |
          python scripts/nightly_report.py

      - name: Commit analytics data and nightly report
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add analytics_history.json docs/ANALYTICS.md docs/analytics.html
          git add docs/reports/

          if ! git diff --staged --quiet; then
            git commit -m "Update analytics and nightly report [skip ci]"

            for i in {1..3}; do
              git pull --rebase --autostash origin main && git push && break || {
                echo "Push failed (attempt $i/3), retrying..."
                sleep $((i * 2))
              }
            done
          fi
