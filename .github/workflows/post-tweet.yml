name: Post Scheduled Tweet

on:
  # Schedule: A/B test — 3 legacy posts/day (journalism gets the other 3 slots)
  schedule:
    - cron: '0 14 * * *'  # 2 PM UTC = 10 AM ET (morning prime)
    - cron: '0 20 * * *'  # 8 PM UTC = 4 PM ET (afternoon)
    - cron: '0 2 * * *'   # 2 AM UTC = 10 PM ET (late night)

  # Allow manual triggering from GitHub Actions tab
  workflow_dispatch:

  # Optional: trigger on push to main (for testing)
  # push:
  #   branches:
  #     - main

permissions:
  contents: write  # Allow workflow to commit and push changes

jobs:
  post-tweet:
    runs-on: ubuntu-latest

    steps:
      - name: Random delay to avoid bot detection
        run: |
          # Random delay between 1-15 minutes to appear more human-like
          DELAY=$((RANDOM % 900 + 60))
          echo "Waiting ${DELAY} seconds before posting..."
          sleep $DELAY

      - uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/setup-python-env

      - name: Generate and post to X and Bluesky
        env:
          # X API credentials (set these in GitHub Secrets)
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}

          # Bluesky credentials (set these in GitHub Secrets)
          BLUESKY_USERNAME: ${{ secrets.BLUESKY_USERNAME }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}

          # AI API keys (set in GitHub Secrets)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_AI_API_KEY: ${{ secrets.X_AI_API_KEY }}

          # Diffbot Article API — Stage 3 body-fetch fallback (free tier, 10K pages/mo)
          # Optional: if DIFFBOT_TOKEN is not set, Stage 3 is skipped silently
          DIFFBOT_TOKEN: ${{ secrets.DIFFBOT_TOKEN }}

          # Bot configuration
          BOT_MODE: scheduled
        run: |
          cd src
          python main.py

      - name: Commit updated post history
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add posts_history.json

          # Only commit and push if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "Update post history [skip ci]"

            # Retry push up to 3 times with pull --rebase to handle concurrent workflow conflicts
            for i in {1..3}; do
              git pull --rebase origin main && git push && break || {
                echo "Push failed (attempt $i/3), retrying..."
                sleep $((i * 2))
              }
            done
          fi

      - name: Report status
        if: failure()
        run: echo "❌ Workflow failed - check logs above"
