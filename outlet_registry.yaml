# Outlet registry for Walter Croncat journalism workflow
# Used by trend_detector, source_gatherer, verification_gate
#
# SLANT VALUES (functional categories for pipeline routing):
#   wire | lean-left | lean-right | center | left | right | international | specialized
#   These determine slant-diversity requirements in Stage 3 (source_gatherer).
#
# ALLSIDES_RATING (public-facing, shown on dossier pages):
#   Left | Lean Left | Center | Lean Right | Right | Not Rated
#   Based on AllSides Media Bias Ratings (allsides.com/media-bias/ratings)
#   as of April 2026. AllSides uses multi-partisan editorial reviews and
#   blind bias surveys. Ratings are fluid and subject to change.
#   Outlets not covered by AllSides (international, specialized beat) are
#   marked "Not Rated" with a note explaining why.
#
# beat values:  general | politics | business | tech | science | health | foreign | courts | accountability
#
# priority 1 = first-pass gather target (wires + top mainstream)
# priority 2 = standard gather target (fills out the slant matrix)
# priority 3 = specialized / beat outlets pulled in when relevant

outlets:
  # --- Wire services -----------------------------------------------------
  # Wire services are functionally distinct from editorial outlets — they
  # produce raw reporting that other outlets republish. AllSides rates AP
  # and Reuters differently on the bias axis, but both serve the same
  # structural role in the pipeline: baseline factual reporting.
  - name: Reuters
    handle: Reuters
    domain: reuters.com
    slant: wire
    allsides_rating: Center
    beat: general
    priority: 1

  - name: Associated Press
    handle: AP
    domain: apnews.com
    slant: wire
    allsides_rating: Left  # AllSides rates AP as Left (confirmed from allsides.com April 2026)
    beat: general
    priority: 1

  - name: Agence France-Presse
    handle: AFP
    domain: afp.com
    slant: wire
    allsides_rating: Not Rated  # AllSides does not rate AFP (non-US wire)
    beat: foreign
    priority: 1

  - name: Bloomberg
    handle: business  # TODO verify handle
    domain: bloomberg.com
    slant: wire
    allsides_rating: Lean Left
    beat: business
    priority: 1

  # --- Lean Left ---------------------------------------------------------
