# Outlet registry for Walter Croncat journalism workflow
# Used by trend_detector, source_gatherer, verification_gate
#
# slant values: wire | left-mainstream | right-mainstream | center | international | specialized
# beat values:  general | politics | business | tech | science | health | foreign | courts | accountability
#
# priority 1 = first-pass gather target (wires + top mainstream)
# priority 2 = standard gather target (fills out the slant matrix)
# priority 3 = specialized / beat outlets pulled in when relevant
#
# Handles are X/Twitter handles (without the @). Where the handle could
# not be confirmed in this pass, a `# TODO verify handle` comment marks
# the entry so the trend_detector module does not silently watch the
# wrong account.

outlets:
  # --- Wires (target: >=3) -----------------------------------------------
  - name: Reuters
    handle: Reuters
    domain: reuters.com
    slant: wire
    beat: general
    priority: 1

  - name: Associated Press
    handle: AP
    domain: apnews.com
    slant: wire
    beat: general
    priority: 1

  - name: Agence France-Presse
    handle: AFP
    domain: afp.com
    slant: wire
    beat: foreign
    priority: 1

  - name: Bloomberg
    handle: business  # TODO verify handle — @business is Bloomberg's main news account, not @Bloomberg
    domain: bloomberg.com
    slant: wire
    beat: business
    priority: 1

  # --- Left-mainstream (target: >=4) -------------------------------------
  - name: The New York Times
    handle: nytimes
    domain: nytimes.com
    slant: left-mainstream
    beat: general
    priority: 1

  - name: The Washington Post
    handle: washingtonpost
    domain: washingtonpost.com
    slant: left-mainstream
    beat: general
    priority: 1

  - name: NPR
    handle: NPR
    domain: npr.org
    slant: left-mainstream
    beat: general
    priority: 2

  - name: The Guardian
    handle: guardian
    domain: theguardian.com
    slant: left-mainstream
    beat: general
    priority: 2

  - name: CNN
    handle: CNN
    domain: cnn.com
    slant: left-mainstream
    beat: general
    priority: 2

  - name: MSNBC
    handle: MSNBC
    domain: msnbc.com
    slant: left-mainstream
