    priority: 3

  - name: Los Angeles Times
    handle: latimes
    domain: latimes.com
    slant: left-mainstream
    beat: general
    priority: 2

  # --- Right-mainstream (target: >=4) ------------------------------------
  - name: Wall Street Journal
    handle: WSJ
    domain: wsj.com
    slant: right-mainstream
    beat: business
    priority: 1
    # Treat WSJ news-side reporting only; opinion desk is editorial, not news.

  - name: Fox News
    handle: FoxNews
    domain: foxnews.com
    slant: right-mainstream
    beat: general
    priority: 2
    # News-side reporting only; cable opinion programming is not "reporting".

  - name: New York Post
    handle: nypost
    domain: nypost.com
    slant: right-mainstream
    beat: general
    priority: 2

  - name: Washington Examiner
